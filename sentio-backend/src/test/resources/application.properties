# Test Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable external services for tests
mqtt.enabled=false
openmeteo.forecast.enabled=false
brightsky.alerts.enabled=false
preprocessing.service.enabled=false
preprocessing.service.url=http://localhost:8082/preprocess-and-classify

# Mock Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/sentio
keycloak.admin.server-url=http://localhost:8080
keycloak.admin.realm=sentio
keycloak.admin.client-id=sentio-backend
keycloak.admin.client-secret=test-secret
keycloak.realm=sentio
