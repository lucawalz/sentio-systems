# Test Configuration - Testcontainers PostgreSQL
# Uses Spring Boot's Testcontainers support for auto-configuration

# Testcontainers PostgreSQL - auto-configured via @ServiceConnection
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable external services for tests
mqtt.enabled=false
queue.enabled=false
openmeteo.forecast.enabled=false
brightsky.alerts.enabled=false
preprocessing.service.enabled=false
preprocessing.service.url=http://localhost:8082/preprocess-and-classify

# Swagger disabled in tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Minimize scheduled task threads
spring.task.scheduling.pool.size=1

# Stream stop delay - set to 0 in tests to avoid real 60s waits
sentio.stream.stop-delay-ms=0

# Mock Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/sentio
keycloak.admin.server-url=http://localhost:8080
keycloak.admin.realm=sentio
keycloak.admin.client-id=sentio-backend
keycloak.admin.client-secret=test-secret
keycloak.realm=sentio

# Logging
logging.level.org.example.backend=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
logging.level.org.hibernate.SQL=WARN
