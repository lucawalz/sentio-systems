# Application Configuration
spring.application.name=Sentio

# Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/sentio}
sentio.auth.secure-cookies=${SECURE_COOKIES:false}
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8080}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:sentio}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET}
keycloak.realm=${KEYCLOAK_REALM:sentio}

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentio}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.data.redis.repositories.enabled=false
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${SERVER_PORT:8080}

# Security Configuration
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://sentio.syslabs.dev}
security.cors.allowed-methods=${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
security.cors.allowed-headers=${SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
security.cors.allow-credentials=${SECURITY_CORS_ALLOW_CREDENTIALS:true}

# MQTT Configuration
mqtt.enabled=${MQTT_ENABLED:true}
mqtt.broker=${MQTT_BROKER:tcp://localhost:1883}
mqtt.clientId=${MQTT_CLIENT_ID:sentioBackend}
mqtt.topics=${MQTT_TOPICS:weather/data,animals/data,device/+/status}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.connectionTimeout=${MQTT_CONNECTION_TIMEOUT:30}
mqtt.keepAliveInterval=${MQTT_KEEP_ALIVE_INTERVAL:60}

# MQTT TLS/SSL Configuration (recommended for production)
mqtt.tls.enabled=${MQTT_TLS_ENABLED:false}
mqtt.tls.ca-cert-path=${MQTT_TLS_CA_CERT:}
mqtt.tls.client-cert-path=${MQTT_TLS_CLIENT_CERT:}
mqtt.tls.client-key-path=${MQTT_TLS_CLIENT_KEY:}
mqtt.tls.client-key-password=${MQTT_TLS_CLIENT_KEY_PASSWORD:}
mqtt.tls.verify-hostname=${MQTT_TLS_VERIFY_HOSTNAME:true}

# Open-Meteo API Configuration
openmeteo.api.base-url=${OPENMETEO_API_BASE_URL:https://api.open-meteo.com/v1}
openmeteo.forecast.update.cron=${OPENMETEO_FORECAST_CRON:0 0 6 * * ?}
openmeteo.forecast.enabled=${OPENMETEO_FORECAST_ENABLED:true}
openmeteo.archive.base-url=${OPENMETEO_ARCHIVE_BASE_URL:https://historical-forecast-api.open-meteo.com/v1}

# IP Location Service Configuration
ip-location.api.url=${IP_LOCATION_API_URL:http://ip-api.com/json/}

# BrightSky API Configuration
brightsky.api.base-url=${BRIGHTSKY_API_BASE_URL:https://api.brightsky.dev}
brightsky.alerts.update.cron=${BRIGHTSKY_ALERTS_CRON:0 */30 * * * ?}
brightsky.alerts.enabled=${BRIGHTSKY_ALERTS_ENABLED:true}
brightsky.alerts.cleanup.cron=${BRIGHTSKY_CLEANUP_CRON:0 0 2 * * ?}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}

# Preprocessing Service Configuration
preprocessing.service.url=${PREPROCESSING_SERVICE_URL:http://localhost:8082/preprocess-and-classify}
preprocessing.service.enabled=${PREPROCESSING_SERVICE_ENABLED:true}

# n8n Workflow Configuration (webhook-based triggering)
n8n.webhook.base-url=${N8N_WEBHOOK_BASE_URL:https://n8n.syslabs.dev/webhook}
n8n.workflow.suffix=${N8N_WORKFLOW_SUFFIX:}

# Resend Email API Configuration
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@syslabs.dev}

# Contact Form Configuration
contact.mail.to=${CONTACT_EMAIL_TO:team@syslabs.dev}

# Password Reset Configuration
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
password-reset.token-expiration-hours=1
email-verification.token-expiration-hours=24

# Redis Queue Configuration (for AI classification with EDA)
queue.enabled=${QUEUE_ENABLED:true}

# Rate Limiting Configuration (Bucket4j)
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
# Authentication endpoints (login, register, password reset)
rate-limit.auth.capacity=${RATE_LIMIT_AUTH_CAPACITY:5}
rate-limit.auth.refill-tokens=${RATE_LIMIT_AUTH_REFILL_TOKENS:5}
rate-limit.auth.refill-period-minutes=${RATE_LIMIT_AUTH_REFILL_MINUTES:1}
# General API endpoints (per user)
rate-limit.api.capacity=${RATE_LIMIT_API_CAPACITY:100}
rate-limit.api.refill-tokens=${RATE_LIMIT_API_REFILL_TOKENS:100}
rate-limit.api.refill-period-minutes=${RATE_LIMIT_API_REFILL_MINUTES:1}
# Public endpoints (contact form, device pairing) - per IP
rate-limit.public.capacity=${RATE_LIMIT_PUBLIC_CAPACITY:10}
rate-limit.public.refill-tokens=${RATE_LIMIT_PUBLIC_REFILL_TOKENS:10}
rate-limit.public.refill-period-minutes=${RATE_LIMIT_PUBLIC_REFILL_MINUTES:1}