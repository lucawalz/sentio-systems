# Mosquitto MQTT Broker Configuration
# Used for both local development (docker-compose) and production (k3s)

# TCP listener (internal communication)
listener 1883

# WebSocket listener (external devices via Ingress/proxy)
listener 9001
protocol websockets

# HTTP Authentication Plugin (mosquitto-go-auth)
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_cache false
auth_opt_log_level debug

# Backend auth endpoint
auth_opt_http_host backend
auth_opt_http_port 8080
auth_opt_http_getuser_uri /api/internal/mqtt/auth
auth_opt_http_superuser_uri /api/internal/mqtt/superuser
auth_opt_http_aclcheck_uri /api/internal/mqtt/acl
auth_opt_http_with_tls false
auth_opt_http_verify_peer false
auth_opt_http_params_mode form

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all