# Mosquitto MQTT Broker Configuration
# Used for both local development (docker-compose) and production (k3s)

# ============================================================
# TCP Listeners (Unencrypted - for local/internal use only)
# ============================================================

# TCP listener (internal communication)
listener 1883
# SECURITY WARNING: This port is unencrypted. Use only behind firewall or for local development.

# WebSocket listener (external devices via Ingress/proxy)
listener 9001
protocol websockets
# SECURITY WARNING: This port is unencrypted. Use only behind TLS-terminating proxy.

# ============================================================
# TLS/SSL Listeners (Recommended for production)
# ============================================================
# Uncomment the following sections to enable TLS encryption

# TLS/SSL listener (secure MQTT over TLS)
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false
# tls_version tlsv1.2

# Secure WebSocket listener (wss://)
# listener 9443
# protocol websockets
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# tls_version tlsv1.2

# ============================================================
# Authentication & Authorization
# ============================================================

# HTTP Authentication Plugin (mosquitto-go-auth)
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_cache false
auth_opt_log_level debug

# Backend auth endpoint
auth_opt_http_host backend
auth_opt_http_port 8080
auth_opt_http_getuser_uri /api/internal/mqtt/auth
auth_opt_http_superuser_uri /api/internal/mqtt/superuser
auth_opt_http_aclcheck_uri /api/internal/mqtt/acl
# SECURITY RECOMMENDATION: In production, use TLS for auth endpoints
auth_opt_http_with_tls false
auth_opt_http_verify_peer false
auth_opt_http_params_mode form

# ============================================================
# Persistence & Logging
# ============================================================

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all