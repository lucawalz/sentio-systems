services:
  # Init Container for Realm Configuration
  init-realm:
    image: alpine:latest
    container_name: sentio-init-realm
    command: >
      sh -c "apk add --no-cache gettext sed && echo 'Generating Keycloak realm configuration...' && sed -e 's|KEYCLOAK_CLIENT_SECRET_PLACEHOLDER|'\"$${KEYCLOAK_ADMIN_CLIENT_SECRET}\"'|g' -e 's|N8N_CLIENT_SECRET_PLACEHOLDER|'\"$${N8N_CLIENT_SECRET}\"'|g' /init-scripts/sentio-realm.json.template > /realm_data/sentio-realm.json && echo 'Realm configuration generated successfully.'"
    volumes:
      - ./init-scripts:/init-scripts:ro
      - realm_data:/realm_data
    environment:
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      N8N_CLIENT_SECRET: ${N8N_CLIENT_SECRET}
    networks:
      - sentio-network

  # Database
  postgres:
    image: postgres:17-alpine
    container_name: sentio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - sentio-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: sentio-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-sentio}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - realm_data:/opt/keycloak/data/import
      - ./themes:/opt/keycloak/themes
    depends_on:
      postgres:
        condition: service_healthy
      init-realm:
        condition: service_completed_successfully
    networks:
      - sentio-network
    restart: unless-stopped

  # MQTT Broker with Auth Plugin
  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: sentio-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - ./sentio-backend/mosquitto.conf:/etc/mosquitto/mosquitto.conf
    networks:
      - sentio-network
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./sentio-backend
      dockerfile: Dockerfile
    container_name: sentio-backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentio
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sentio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # JPA Configuration
      JPA_HIBERNATE_DDL: ${JPA_HIBERNATE_DDL:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL:-false}

      # Server Configuration
      SERVER_PORT: 8080

      # Keycloak Configuration
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/sentio
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/sentio/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_ADMIN_REALM: sentio
      KEYCLOAK_ADMIN_CLIENT_ID: sentio-backend
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KEYCLOAK_REALM: sentio

      # MQTT Configuration
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_CLIENT_ID: sentioBackend
      MQTT_TOPICS: ${MQTT_TOPICS:-weather/data,weather/status,animal_detection/events,animal_detection/status}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}

      # External APIs
      OPENMETEO_API_BASE_URL: https://api.open-meteo.com/v1
      OPENMETEO_ARCHIVE_BASE_URL: https://historical-forecast-api.open-meteo.com/v1
      IP_LOCATION_API_URL: http://ip-api.com/json/
      BRIGHTSKY_API_BASE_URL: https://api.brightsky.dev

      # Feature Flags
      OPENMETEO_FORECAST_ENABLED: ${OPENMETEO_FORECAST_ENABLED:-true}
      BRIGHTSKY_ALERTS_ENABLED: ${BRIGHTSKY_ALERTS_ENABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_UI_ENABLED: ${SWAGGER_UI_ENABLED:-true}

      # AI Services
      PREPROCESSING_SERVICE_URL: http://preprocessing:8082/preprocess-and-classify
      PREPROCESSING_SERVICE_ENABLED: ${PREPROCESSING_SERVICE_ENABLED:-true}

      # n8n Workflow Integration
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-https://n8n.syslabs.dev/webhook}
    ports:
      - "${BACKEND_PORT:-8083}:8080"
    networks:
      - sentio-network
    volumes:
      - ./sentio-backend/images:/app/images
      - shared_images:/app/shared_images
    restart: unless-stopped

  # Frontend Service (React + Vite + Nginx)
  frontend:
    build:
      context: ./sentio-frontend-new
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: sentio-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - sentio-network
    restart: unless-stopped

  # Image Preprocessing Service
  preprocessing:
    build:
      context: ./sentio-ai/preprocessing
      dockerfile: Dockerfile
    container_name: sentio-preprocessing
    depends_on:
      - birder
      - speciesnet
    environment:
      PREPROCESSING_PORT: ${PREPROCESSING_PORT:-8082}
      BIRDER_SERVICE_URL: ${BIRDER_SERVICE_URL:-http://birder:8000}
      SPECIESNET_SERVICE_URL: ${SPECIESNET_SERVICE_URL:-http://speciesnet:8000}
      BIRD_CLASSIFIER_URL: http://birder:8000/detect
      SPECIES_CLASSIFIER_URL: http://speciesnet:8000/detect
    ports:
      - "${PREPROCESSING_PORT:-8082}:8082"
    networks:
      - sentio-network
    volumes:
      - shared_images:/app/enhanced_images
    restart: unless-stopped

  # Birder AI Service
  birder:
    build:
      context: ./sentio-ai/birder
      dockerfile: Dockerfile
    container_name: sentio-birder
    environment:
      BIRDER_PORT: ${BIRDER_PORT:-8000}
    ports:
      - "${BIRDER_PORT:-8000}:8000"
    networks:
      - sentio-network
    volumes:
      - ai_models:/app/models
    restart: unless-stopped

  # SpeciesNet AI Service
  speciesnet:
    build:
      context: ./sentio-ai/speciesnet
      dockerfile: Dockerfile
    container_name: sentio-speciesnet
    environment:
      SPECIESNET_PORT: ${SPECIESNET_PORT:-8081}
    ports:
      - "${SPECIESNET_PORT:-8081}:8081"
    networks:
      - sentio-network
    restart: unless-stopped

networks:
  sentio-network:
    driver: bridge
    name: sentio-network

volumes:
  postgres_data:
    name: sentio_postgres_data
  realm_data:
    name: sentio_realm_data
  mosquitto_data:
    name: sentio_mosquitto_data
  mosquitto_logs:
    name: sentio_mosquitto_logs
  shared_images:
    name: sentio_shared_images
  ai_models:
    name: sentio_ai_models
