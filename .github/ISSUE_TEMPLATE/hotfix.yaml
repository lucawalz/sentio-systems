name: Hotfix
description: Critical production issue requiring immediate fix
title: "HOTFIX-[NUMBER]: "
labels: ["hotfix", "critical"]
projects: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Hotfix Template
        
        **⚠️ Use this template only for critical production issues that require immediate attention.**
        
        Replace `[NUMBER]` in the title with the next incremental ID (e.g., HOTFIX-001, HOTFIX-002).
        Add a clear, descriptive title after the colon.
        
        **Branch naming convention:**
        ```
        hotfix/critical-fix
        ```
        
        **Workflow:**
        - Branch from `main`
        - Fix the issue
        - Merge back to both `main` and `develop`
        
        **Commit reference example:**
        ```
        git commit -m "HOTFIX-001: Fix critical MQTT broker crash (Closes #20)"
        ```

  - type: dropdown
    id: affected_component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - sentio-backend
        - sentio-web
        - sentio-ai (birder)
        - sentio-ai (preprocessing)
        - sentio-ai (speciesnet)
        - sentio-embedded
        - Infrastructure/Deployment
        - Multiple components
      default: 0
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: Problem Description
      description: What is the critical issue?
      placeholder: |
        Describe the production problem clearly and concisely.
        
        Example: "MQTT broker is crashing every 30 minutes causing all devices to lose connection. System is effectively down."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact & Urgency
      description: What is the business/technical impact? Why is this a hotfix?
      placeholder: |
        - All devices are disconnected
        - No telemetry data is being collected
        - Customer-facing dashboard shows no data
        - Estimated downtime: X hours
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: Root Cause
      description: If known, describe what caused this issue
      placeholder: "Memory leak in MQTT connection handler introduced in commit abc123."
    validations:
      required: false

  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed Fix
      description: Brief description of the fix to be applied
      placeholder: |
        - Revert problematic commit
        - Add connection pooling with proper cleanup
        - Increase memory limit temporarily
    validations:
      required: true

  - type: textarea
    id: testing_plan
    attributes:
      label: Testing Plan
      description: How will you verify the fix works?
      placeholder: |
        - [ ] Test MQTT connection stability over 2 hours
        - [ ] Verify memory usage remains stable
        - [ ] Confirm all devices reconnect successfully
        - [ ] Check logs for errors
      value: |
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: rollback_plan
    attributes:
      label: Rollback Plan
      description: If the fix fails, how will you rollback?
      placeholder: "Revert to previous Docker image tag: v1.2.3"
    validations:
      required: true

  - type: textarea
    id: logs_evidence
    attributes:
      label: Logs / Evidence
      description: Add relevant logs or monitoring data
      placeholder: |
        ```
        [CRITICAL] OutOfMemoryError in MQTTBroker
        ...
        ```
    validations:
      required: false

  - type: input
    id: related_issues
    attributes:
      label: Related Issues
      description: Link to related bugs or requirements
      placeholder: "BUG-015, REQ-001"
    validations:
      required: false
