name: Bug Report
description: Report a bug or issue in the Sentio Systems project
title: "BUG-[NUMBER]: "
labels: ["bug"]
projects: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report Template
        
        Replace `[NUMBER]` in the title with the next incremental ID (e.g., BUG-001, BUG-002).
        Add a clear, descriptive title after the colon.
        
        **Branch naming convention:**
        ```
        bugfix/issue-YYY
        ```
        
        **Commit reference example:**
        ```
        git commit -m "BUG-003: Fix MQTT connection timeout (Closes #15)"
        ```

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this bug?
      options:
        - Critical (System unusable)
        - High (Major functionality broken)
        - Medium (Feature partially broken)
        - Low (Minor issue or cosmetic)
      default: 2
    validations:
      required: true

  - type: dropdown
    id: affected_component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - sentio-backend
        - sentio-web
        - sentio-ai (birder)
        - sentio-ai (preprocessing)
        - sentio-ai (speciesnet)
        - sentio-embedded
        - Infrastructure/Deployment
        - Multiple components
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: |
        Describe what is happening that shouldn't be happening.
        
        Example: "When submitting telemetry data via MQTT, the backend crashes with a NullPointerException if the GPS coordinates are missing."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How can this bug be reproduced?
      placeholder: |
        1. Start the backend service
        2. Send MQTT message to topic 'orbis/device-001/telemetry' without GPS data
        3. Observe backend logs
        4. See error thrown
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The backend should handle missing GPS data gracefully and log a warning instead of crashing."
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "Backend service crashes with NullPointerException and requires restart."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide relevant environment details
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker version: 24.0.5
        - Java version: 21
        - Branch: develop
        - Commit: abc123
    validations:
      required: false

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs / Screenshots
      description: Add relevant logs, stack traces, or screenshots
      placeholder: |
        ```
        [ERROR] NullPointerException at TelemetryService.java:42
        ...
        ```
    validations:
      required: false

  - type: textarea
    id: related_requirements
    attributes:
      label: Related Requirements
      description: Link to any related requirements or issues
      placeholder: |
        - REQ-001: Device Telemetry Publish
        - Related to #12
    validations:
      required: false
