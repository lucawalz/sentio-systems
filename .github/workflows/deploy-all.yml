name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  check-services:
    name: Check Which Services Changed
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      birder: ${{ steps.changes.outputs.birder }}
      speciesnet: ${{ steps.changes.outputs.speciesnet }}
      preprocessing: ${{ steps.changes.outputs.preprocessing }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^sentio-backend/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -q '^sentio-web/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -q '^sentio-ai/birder/'; then
            echo "birder=true" >> $GITHUB_OUTPUT
          else
            echo "birder=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -q '^sentio-ai/speciesnet/'; then
            echo "speciesnet=true" >> $GITHUB_OUTPUT
          else
            echo "speciesnet=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -q '^sentio-ai/preprocessing/'; then
            echo "preprocessing=true" >> $GITHUB_OUTPUT
          else
            echo "preprocessing=false" >> $GITHUB_OUTPUT
          fi

  deploy-backend:
    name: Deploy Backend
    needs: check-services
    if: needs.check-services.outputs.backend == 'true'
    uses: ./.github/workflows/backend-ci.yml

  deploy-frontend:
    name: Deploy Frontend
    needs: check-services
    if: needs.check-services.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-ci.yml

  deploy-birder:
    name: Deploy Birder AI
    needs: check-services
    if: needs.check-services.outputs.birder == 'true'
    uses: ./.github/workflows/birder-ci.yml

  deploy-speciesnet:
    name: Deploy SpeciesNet AI
    needs: check-services
    if: needs.check-services.outputs.speciesnet == 'true'
    uses: ./.github/workflows/speciesnet-ci.yml

  deploy-preprocessing:
    name: Deploy Preprocessing
    needs: check-services
    if: needs.check-services.outputs.preprocessing == 'true'
    uses: ./.github/workflows/preprocessing-ci.yml

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-birder, deploy-speciesnet, deploy-preprocessing]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Birder AI: ${{ needs.deploy-birder.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SpeciesNet AI: ${{ needs.deploy-speciesnet.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preprocessing: ${{ needs.deploy-preprocessing.result }}" >> $GITHUB_STEP_SUMMARY