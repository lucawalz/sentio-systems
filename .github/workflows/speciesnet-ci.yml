name: SpeciesNet AI CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'sentio-ai/speciesnet/**'
      - '.github/workflows/speciesnet-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'sentio-ai/speciesnet/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/speciesnet-ai

jobs:
  test:
    name: Test SpeciesNet AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentio-ai/speciesnet/requirements.txt

      - name: Install dependencies
        working-directory: ./sentio-ai/speciesnet
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install speciesnet

      - name: Run health check test
        working-directory: ./sentio-ai/speciesnet
        run: |
          python -c "
          import sys
          try:
              import fastapi
              import speciesnet
              print('All imports successful')
              sys.exit(0)
          except ImportError as e:
              print(f'Import failed: {e}')
              sys.exit(1)
          "

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-ai/speciesnet
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max