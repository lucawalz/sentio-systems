name: Sentio CI/CD
on:
  push:
    branches: [main, develop, "release/**"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      version_bump:
        description: "Version bump type"
        required: false
        type: choice
        default: "patch"
        options:
          - major
          - minor
          - patch
env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
# Prevent concurrent deployments per environment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for proper versioning
      - name: Calculate short SHA
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Short SHA: $SHORT_SHA"
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest semver tag
          LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      - name: Calculate semantic version
        id: semver
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"

          # Remove the 'v' prefix for calculation
          VERSION=${LATEST_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          # Determine version bump based on branch or manual input
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"

          if [ -z "$BUMP_TYPE" ]; then
            # Auto-determine based on branch
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi

          # Apply version bump
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # FIX: Use Unix timestamp for pre-release to ensure proper semver ordering
          # Commit hash (e.g., dev.c25d939) doesn't sort chronologically
          # Timestamp (e.g., dev.1703001234) always increases = correct ordering
          TIMESTAMP=$(date +%s)

          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            NEW_VERSION="$NEW_VERSION-dev.$TIMESTAMP"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            NEW_VERSION="$NEW_VERSION-rc.$TIMESTAMP"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $NEW_VERSION"
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai: ${{ steps.filter.outputs.ai }}
      embedded: ${{ steps.filter.outputs.embedded }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'sentio-backend/**'
            frontend:
              - 'sentio-web/**'
            ai:
              - 'sentio-ai/**'
            embedded:
              - 'sentio-embedded/**'
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
      - name: Print Trivy filesystem results (CI log)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
        continue-on-error: true
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "filesystem"
  backend-test:
    name: Backend - Test, Coverage & Build
    runs-on: ubuntu-latest
    needs: [version, changes]
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For better coverage diffs

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # Unit tests first (fast, no containers) - see ADR-0013 for rationale
      - name: Run Unit Tests
        working-directory: ./sentio-backend
        run: |
          ./mvnw test \
            -Dtest="*Test,!*IT" \
            -DfailIfNoTests=false \
            -B
        timeout-minutes: 20
        env:
          SPRING_PROFILES_ACTIVE: test

      # Integration tests with Testcontainers. SentioApplicationTests is included
      # here (not above) because it requires a real DB container.
      # Uses failsafe directly to avoid re-running unit tests from the test phase.
      - name: Run Integration Tests
        working-directory: ./sentio-backend
        run: |
          ./mvnw failsafe:integration-test failsafe:verify \
            -Dit.test="*IT,SentioApplicationTests" \
            -DfailIfNoTests=false \
            -B
        timeout-minutes: 20
        env:
          SPRING_PROFILES_ACTIVE: test
          TESTCONTAINERS_REUSE_ENABLE: true

      - name: Generate Coverage Report
        working-directory: ./sentio-backend
        if: always()
        run: ./mvnw jacoco:report -B

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: ./sentio-backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Generate Coverage Summary
        if: always()
        working-directory: ./sentio-backend
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "# Test Coverage Report" > coverage-summary.md
            echo "" >> coverage-summary.md
            COVERAGE=$(awk -F',' '
              NR>1 {
                inst_missed += $4;
                inst_covered += $5;
                branch_missed += $6;
                branch_covered += $7;
              }
              END {
                total_inst = inst_missed + inst_covered;
                total_branch = branch_missed + branch_covered;
                inst_pct = (total_inst > 0) ? (inst_covered * 100.0 / total_inst) : 0;
                branch_pct = (total_branch > 0) ? (branch_covered * 100.0 / total_branch) : 0;

                printf "**Overall Coverage:**\n";
                printf "- Instruction Coverage: %.1f%% (%d/%d)\n", inst_pct, inst_covered, total_inst;
                printf "- Branch Coverage: %.1f%% (%d/%d)\n\n", branch_pct, branch_covered, total_branch;

                status = (inst_pct >= 50 && branch_pct >= 35) ? "PASS: Meets minimum threshold" : "FAIL: Below minimum threshold";
                target = (inst_pct >= 80 && branch_pct >= 75) ? "Meets target" : "Target: 80% instruction, 75% branch";

                printf "**Status:** %s\n", status;
                printf "**Goal:** %s\n", target;
              }
            ' target/site/jacoco/jacoco.csv)

            echo "$COVERAGE" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "[View Full Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> coverage-summary.md
          fi

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request' && always() && hashFiles('sentio-backend/coverage-summary.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: coverage
          path: ./sentio-backend/coverage-summary.md

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ needs.version.outputs.short_sha }}
          path: |
            sentio-backend/target/surefire-reports/
            sentio-backend/target/failsafe-reports/
          retention-days: 7

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ needs.version.outputs.short_sha }}
          path: sentio-backend/target/site/jacoco/
          retention-days: 7

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        with:
          files: |
            sentio-backend/target/surefire-reports/TEST-*.xml
            sentio-backend/target/failsafe-reports/TEST-*.xml
          check_name: Backend Test Results
          comment_mode: failures

      - name: Check Coverage Threshold
        if: always()
        working-directory: ./sentio-backend
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            INST_COVERAGE=$(awk -F',' '
              NR>1 {
                inst_missed += $4;
                inst_covered += $5;
              }
              END {
                total = inst_missed + inst_covered;
                if (total > 0) {
                  print (inst_covered * 100.0 / total);
                } else {
                  print 0;
                }
              }
            ' target/site/jacoco/jacoco.csv)

            BRANCH_COVERAGE=$(awk -F',' '
              NR>1 {
                branch_missed += $6;
                branch_covered += $7;
              }
              END {
                total = branch_missed + branch_covered;
                if (total > 0) {
                  print (branch_covered * 100.0 / total);
                } else {
                  print 0;
                }
              }
            ' target/site/jacoco/jacoco.csv)

            echo "Instruction Coverage: $INST_COVERAGE%"
            echo "Branch Coverage: $BRANCH_COVERAGE%"

            MIN_INST=50
            MIN_BRANCH=35

            if (( $(echo "$INST_COVERAGE < $MIN_INST" | bc -l) )); then
              echo "FAIL: Instruction coverage $INST_COVERAGE% is below minimum threshold $MIN_INST%"
              exit 1
            fi

            if (( $(echo "$BRANCH_COVERAGE < $MIN_BRANCH" | bc -l) )); then
              echo "FAIL: Branch coverage $BRANCH_COVERAGE% is below minimum threshold $MIN_BRANCH%"
              exit 1
            fi

            echo "PASS: Coverage meets minimum thresholds"
          else
            echo "WARNING: No coverage report found, skipping threshold check"
          fi

      - name: Package application
        working-directory: ./sentio-backend
        run: ./mvnw package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-${{ needs.version.outputs.short_sha }}
          path: sentio-backend/target/*.jar
          retention-days: 7
  backend-docker:
    name: Backend - Build & Push Image
    runs-on: ubuntu-latest
    needs: [version, backend-test, code-quality]
    if: github.event_name != 'pull_request' && !failure() && !cancelled()
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sentio-backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend:${{ needs.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=Sentio Backend
            org.opencontainers.image.description=Sentio Systems Backend Service
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}
          provenance: true
          sbom: true
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend:${{ needs.version.outputs.version }}
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
      - name: Print Trivy backend image results (CI log)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend:${{ needs.version.outputs.version }}
          format: "table"
          severity: "CRITICAL,HIGH"
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-backend.sarif"
          category: "backend-image"
  frontend-test:
    name: Frontend - Test, Lint & Build
    runs-on: ubuntu-latest
    needs: [version, changes]
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sentio-web/package-lock.json

      - name: Install dependencies
        working-directory: ./sentio-web
        run: npm ci
        timeout-minutes: 5

      - name: Run linter
        working-directory: ./sentio-web
        run: npm run lint
        timeout-minutes: 3

      - name: Type check
        working-directory: ./sentio-web
        run: npx tsc --noEmit
        timeout-minutes: 3

      - name: Run tests
        working-directory: ./sentio-web
        run: npm run test:coverage
        timeout-minutes: 5
        env:
          CI: true

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ needs.version.outputs.short_sha }}
          path: sentio-web/coverage/
          retention-days: 7

      - name: Build application
        working-directory: ./sentio-web
        run: npm run build
        timeout-minutes: 5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ needs.version.outputs.short_sha }}
          path: sentio-web/dist/
          retention-days: 7
  frontend-docker:
    name: Frontend - Build & Push Image
    runs-on: ubuntu-latest
    needs: [version, frontend-test, code-quality]
    if: github.event_name != 'pull_request' && !failure() && !cancelled()
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sentio-web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-web:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-web:${{ needs.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-web:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=Sentio Web
            org.opencontainers.image.description=Sentio Systems Frontend
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          build-args: |
            VITE_API_URL=/api
          provenance: true
          sbom: true
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-web:${{ needs.version.outputs.version }}
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "frontend-image"
  ai-services-test:
    name: ${{ matrix.service }} - Test & Build
    runs-on: ubuntu-latest
    needs: [version, changes]
    if: |
      needs.changes.outputs.ai == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - birder
          - speciesnet
          - preprocessing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sentio-ai/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        working-directory: ./sentio-ai/${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run syntax check
        working-directory: ./sentio-ai/${{ matrix.service }}
        run: python -m py_compile $(find . -name "*.py" -not -path "./venv/*" -not -path "./tests/*")
      - name: Run tests
        working-directory: ./sentio-ai/${{ matrix.service }}
        timeout-minutes: 10
        run: pytest tests/ --cov --cov-report=xml --cov-report=html --junit-xml=test-results.xml -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-${{ matrix.service }}-test-results
          path: sentio-ai/${{ matrix.service }}/test-results.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-${{ matrix.service }}-coverage
          path: sentio-ai/${{ matrix.service }}/htmlcov/
          retention-days: 7

  ai-services-docker:
    name: ${{ matrix.service }} - Build & Push Image
    runs-on: ubuntu-latest
    needs: [version, ai-services-test, code-quality]
    if: github.event_name != 'pull_request' && !failure() && !cancelled()
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - birder
          - speciesnet
          - preprocessing
        include:
          - service: birder
            image_name: birder-ai
          - service: speciesnet
            image_name: speciesnet-ai
          - service: preprocessing
            image_name: preprocessing-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/local/share/chromium
          sudo docker system prune -af
          echo "Disk space after cleanup:"
          df -h
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sentio-ai/${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.image_name }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.image_name }}:${{ needs.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.image_name }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=Sentio ${{ matrix.service }} AI Service
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ github.ref_name }}
          provenance: true
          sbom: true
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.image_name }}:${{ needs.version.outputs.version }}
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "${{ matrix.service }}-image"
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - backend-docker
      - frontend-docker
      - ai-services-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## Release v${{ needs.version.outputs.version }}

            **Commit:** ${{ github.sha }}

            ### Container Images
            All images are available at `ghcr.io/${{ github.repository }}`

            - `sentio-backend:${{ needs.version.outputs.version }}`
            - `sentio-web:${{ needs.version.outputs.version }}`
            - `birder-ai:${{ needs.version.outputs.version }}`
            - `speciesnet-ai:${{ needs.version.outputs.version }}`
            - `preprocessing-service:${{ needs.version.outputs.version }}`

            ### Deployment
            Images are automatically rolled out to Kubernetes via Flux GitOps.
          draft: false
          prerelease: false
  deployment-notification:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs:
      - version
      - backend-docker
      - frontend-docker
      - ai-services-docker
    if: github.event_name != 'pull_request' && !failure() && !cancelled()
    steps:
      - name: Deployment Summary
        run: |
          echo "# Sentio Systems - Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** \`${{ needs.version.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Deployment Strategy" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
            echo "**Auto-Deploy:** Via Flux GitOps (automatic)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "**Environment:** Staging" >> $GITHUB_STEP_SUMMARY
            echo "**Auto-Deploy:** Via Flux GitOps (automatic)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Environment:** Development" >> $GITHUB_STEP_SUMMARY
            echo "**Auto-Deploy:** Manual verification required" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All images have been built and pushed to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/sentio-backend:${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/sentio-web:${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/birder-ai:${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/speciesnet-ai:${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository }}/preprocessing-service:${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Flux GitOps Integration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Flux ImageUpdateAutomation will automatically detect and deploy these images based on:" >> $GITHUB_STEP_SUMMARY
          echo "- Semantic version policy for production (main branch)" >> $GITHUB_STEP_SUMMARY
          echo "- Branch-name tags for development/staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor deployment status:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "flux get image policy -n sentio-systems" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get pods -n sentio-systems -w" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
