          cache-from: type=gha,scope=speciesnet
          cache-to: type=gha,mode=max,scope=speciesnet

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/speciesnet-ai:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-speciesnet-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-speciesnet-image.sarif'
          category: 'speciesnet-image'

  # ============================================
  # PREPROCESSING SERVICE
  # ============================================
  preprocessing-test:
    name: Test Preprocessing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          
          # Remove unnecessary software
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentio-ai/preprocessing/requirements.txt

      - name: Install dependencies
        working-directory: ./sentio-ai/preprocessing
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: ./sentio-ai/preprocessing
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./venv/*")
        continue-on-error: true

      - name: Run import tests
        working-directory: ./sentio-ai/preprocessing
        run: |
          python -c "
          import sys
          print('Testing Preprocessing Service imports...')
          try:
              import fastapi
              print('FastAPI imported')
              import cv2
              print('OpenCV imported')
              import numpy
              print('NumPy imported')
              import httpx
              print('HTTPX imported')
              print('All imports successful!')
              sys.exit(0)
          except ImportError as e:
              print(f'Import failed: {e}')
              sys.exit(1)
          "

      - name: Run tests (if available)
        working-directory: ./sentio-ai/preprocessing
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/
          else
            echo "No tests directory found, skipping..."
          fi
        continue-on-error: true

  preprocessing-build:
    name: Build & Push Preprocessing
    runs-on: ubuntu-latest
    needs: [preprocessing-test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/preprocessing-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-ai/preprocessing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=preprocessing
          cache-to: type=gha,mode=max,scope=preprocessing

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}/preprocessing-service:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-preprocessing-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-preprocessing-image.sarif'
          category: 'preprocessing-image'

    # ============================================
  # DEPLOYMENT - Trigger Tekton Pipeline
  # ============================================
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - birder-build
      - speciesnet-build
      - preprocessing-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://sentio.syslabs.dev' || 'https://sentio-staging.syslabs.dev' }}

    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Tekton Deployment
        env:
          # Configure this secret in GitHub Repo Settings -> Secrets and variables -> Actions
          WEBHOOK_SECRET: ${{ secrets.TEKTON_WEBHOOK_SECRET }}
          WEBHOOK_URL: "https://sentio-webhook.syslabs.dev"
        run: |
          echo "Triggering deployment..."
          
          # Construct JSON payload compatible with our Tekton TriggerBinding
          PAYLOAD=$(cat <<EOF
          {
            "ref": "${{ github.ref }}",
            "after": "${{ github.sha }}",
            "repository": {
              "clone_url": "https://github.com/${{ github.repository }}.git",
              "full_name": "${{ github.repository }}"
            }
          }
          EOF
          )
          
          # Generate HMAC signature for security (required by GitHub Interceptor)
          SIG="sha1=$(echo -n "$PAYLOAD" | openssl sha1 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          
          # Send Request
          curl -v -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature: $SIG" \
            -d "$PAYLOAD"

  # ============================================
  # DEPLOYMENT SUMMARY
  # ============================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - security-scan
      - backend-build
      - frontend-build
      - birder-build
      - speciesnet-build
      - preprocessing-build
      - deploy
    if: always()

    steps:
      - name: Create deployment summary
        run: |
          echo "# Sentio Systems CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Security Scan" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "**Dependency Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "**Dependency Scan**: Failed - Check Security tab" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Dependency Scan**: Skipped" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Service Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Backend
          if [ "${{ needs.backend-build.result }}" == "success" ]; then
            echo "**Backend (Java 21 + Maven)**: Built, tested, and pushed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.backend-build.result }}" == "skipped" ]; then
            echo "**Backend**: Skipped (PR or non-deployable branch)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Backend**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Frontend
          if [ "${{ needs.frontend-build.result }}" == "success" ]; then
            echo "**Frontend (Node.js 20)**: Built, tested, and pushed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.frontend-build.result }}" == "skipped" ]; then
            echo "**Frontend**: Skipped (PR or non-deployable branch)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Frontend**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Birder AI
          if [ "${{ needs.birder-build.result }}" == "success" ]; then
            echo "**Birder AI (Python 3.11)**: Built, tested, and pushed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.birder-build.result }}" == "skipped" ]; then
            echo "**Birder AI**: Skipped (PR or non-deployable branch)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Birder AI**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # SpeciesNet AI
          if [ "${{ needs.speciesnet-build.result }}" == "success" ]; then
