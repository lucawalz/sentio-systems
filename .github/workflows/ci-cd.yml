name: Complete CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      birder: ${{ steps.filter.outputs.birder }}
      speciesnet: ${{ steps.filter.outputs.speciesnet }}
      preprocessing: ${{ steps.filter.outputs.preprocessing }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'sentio-backend/**'
              - '.github/workflows/ci-cd-pipeline.yml'
            frontend:
              - 'sentio-web/**'
              - '.github/workflows/ci-cd-pipeline.yml'
            birder:
              - 'sentio-ai/birder/**'
              - '.github/workflows/ci-cd-pipeline.yml'
            speciesnet:
              - 'sentio-ai/speciesnet/**'
              - '.github/workflows/ci-cd-pipeline.yml'
            preprocessing:
              - 'sentio-ai/preprocessing/**'
              - '.github/workflows/ci-cd-pipeline.yml'

  # ============================================
  # BACKEND SERVICE (TESTS SKIPPED)
  # ============================================
  backend-build:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' && 
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ============================================
  # FRONTEND SERVICE
  # ============================================
  frontend-test:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sentio-web/package-lock.json

      - name: Install dependencies
        working-directory: ./sentio-web
        run: npm ci

      - name: Run linter
        working-directory: ./sentio-web
        run: npm run lint
        continue-on-error: true

      - name: Build application
        working-directory: ./sentio-web
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: sentio-web/dist/
          retention-days: 30

  frontend-build:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-test]
    if: |
      needs.detect-changes.outputs.frontend == 'true' && 
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/sentio-web
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ============================================
  # BIRDER AI SERVICE
  # ============================================
  birder-test:
    name: Test Birder AI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.birder == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentio-ai/birder/requirements.txt

      - name: Install dependencies
        working-directory: ./sentio-ai/birder
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import tests
        working-directory: ./sentio-ai/birder
        run: |
          python -c "
          import sys
          print('Testing Birder AI imports...')
          try:
              import fastapi
              print('✓ FastAPI imported')
              import birder
              print('✓ Birder imported')
              import torch
              print('✓ PyTorch imported')
              import PIL
              print('✓ Pillow imported')
              print('All imports successful!')
              sys.exit(0)
          except ImportError as e:
              print(f'✗ Import failed: {e}')
              sys.exit(1)
          "

  birder-build:
    name: Build & Push Birder AI
    runs-on: ubuntu-latest
    needs: [detect-changes, birder-test]
    if: |
      needs.detect-changes.outputs.birder == 'true' && 
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/birder-ai
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-ai/birder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=birder
          cache-to: type=gha,mode=max,scope=birder

  # ============================================
  # SPECIESNET AI SERVICE
  # ============================================
  speciesnet-test:
    name: Test SpeciesNet AI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.speciesnet == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentio-ai/speciesnet/requirements.txt

      - name: Install dependencies
        working-directory: ./sentio-ai/speciesnet
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install speciesnet

      - name: Run import tests
        working-directory: ./sentio-ai/speciesnet
        run: |
          python -c "
          import sys
          print('Testing SpeciesNet AI imports...')
          try:
              import fastapi
              print('✓ FastAPI imported')
              import speciesnet
              print('✓ SpeciesNet imported')
              import PIL
              print('✓ Pillow imported')
              print('All imports successful!')
              sys.exit(0)
          except ImportError as e:
              print(f'✗ Import failed: {e}')
              sys.exit(1)
          "

  speciesnet-build:
    name: Build & Push SpeciesNet AI
    runs-on: ubuntu-latest
    needs: [detect-changes, speciesnet-test]
    if: |
      needs.detect-changes.outputs.speciesnet == 'true' && 
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/speciesnet-ai
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-ai/speciesnet
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=speciesnet
          cache-to: type=gha,mode=max,scope=speciesnet

  # ============================================
  # PREPROCESSING SERVICE
  # ============================================
  preprocessing-test:
    name: Test Preprocessing
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.preprocessing == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentio-ai/preprocessing/requirements.txt

      - name: Install dependencies
        working-directory: ./sentio-ai/preprocessing
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import tests
        working-directory: ./sentio-ai/preprocessing
        run: |
          python -c "
          import sys
          print('Testing Preprocessing Service imports...')
          try:
              import fastapi
              print('✓ FastAPI imported')
              import cv2
              print('✓ OpenCV imported')
              import numpy
              print('✓ NumPy imported')
              import httpx
              print('✓ HTTPX imported')
              print('All imports successful!')
              sys.exit(0)
          except ImportError as e:
              print(f'✗ Import failed: {e}')
              sys.exit(1)
          "

  preprocessing-build:
    name: Build & Push Preprocessing
    runs-on: ubuntu-latest
    needs: [detect-changes, preprocessing-test]
    if: |
      needs.detect-changes.outputs.preprocessing == 'true' && 
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/preprocessing-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sentio-ai/preprocessing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=preprocessing
          cache-to: type=gha,mode=max,scope=preprocessing

  # ============================================
  # DEPLOYMENT SUMMARY
  # ============================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - backend-build
      - frontend-build
      - birder-build
      - speciesnet-build
      - preprocessing-build
    if: always()

    steps:
      - name: Create deployment summary
        run: |
          echo "# Sentio Systems Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Service Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Backend
          if [ "${{ needs.detect-changes.outputs.backend }}" == "true" ]; then
            if [ "${{ needs.backend-build.result }}" == "success" ]; then
              echo "**Backend**: Built and pushed successfully (tests skipped)" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.backend-build.result }}" == "skipped" ]; then
              echo "**Backend**: Skipped (PR or non-main branch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Backend**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Backend**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Frontend
          if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]; then
            if [ "${{ needs.frontend-build.result }}" == "success" ]; then
              echo "**Frontend**: Built and pushed successfully" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.frontend-build.result }}" == "skipped" ]; then
              echo "**Frontend**: Skipped (PR or non-main branch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Frontend**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Frontend**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Birder AI
          if [ "${{ needs.detect-changes.outputs.birder }}" == "true" ]; then
            if [ "${{ needs.birder-build.result }}" == "success" ]; then
              echo "**Birder AI**: Built and pushed successfully" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.birder-build.result }}" == "skipped" ]; then
              echo "**Birder AI**: Skipped (PR or non-main branch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Birder AI**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Birder AI**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # SpeciesNet AI
          if [ "${{ needs.detect-changes.outputs.speciesnet }}" == "true" ]; then
            if [ "${{ needs.speciesnet-build.result }}" == "success" ]; then
              echo "**SpeciesNet AI**: Built and pushed successfully" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.speciesnet-build.result }}" == "skipped" ]; then
              echo "**SpeciesNet AI**: Skipped (PR or non-main branch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**SpeciesNet AI**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**SpeciesNet AI**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Preprocessing
          if [ "${{ needs.detect-changes.outputs.preprocessing }}" == "true" ]; then
            if [ "${{ needs.preprocessing-build.result }}" == "success" ]; then
              echo "**Preprocessing**: Built and pushed successfully" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.preprocessing-build.result }}" == "skipped" ]; then
              echo "**Preprocessing**: Skipped (PR or non-main branch)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Preprocessing**: Failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Preprocessing**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images are available at: \`ghcr.io/${{ github.repository }}/[service-name]:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/sentio-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/sentio-web:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/birder-ai:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/speciesnet-ai:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/preprocessing-service:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note**: Backend tests are currently skipped. Configure database properly before enabling tests." >> $GITHUB_STEP_SUMMARY