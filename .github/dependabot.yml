# Dependabot is PAUSED. This project is not actively maintained.
# All scheduled version-update jobs are disabled below via
# `open-pull-requests-limit: 0`. To resume, restore the limits
# (or remove the override) and the weekly schedules take effect again.
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 0

  # Backend
  - package-ecosystem: "maven"
    directory: "/sentio-backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "backend"]
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types: ["version-update:semver-major"]

  # Frontend
  - package-ecosystem: "npm"
    directory: "/sentio-web"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "frontend"]
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # AI services
  - package-ecosystem: "pip"
    directory: "/sentio-ai/birder"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ai"]
    open-pull-requests-limit: 0

  - package-ecosystem: "pip"
    directory: "/sentio-ai/speciesnet"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ai"]
    open-pull-requests-limit: 0

  - package-ecosystem: "pip"
    directory: "/sentio-ai/preprocessing"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ai"]
    open-pull-requests-limit: 0

  # Docker
  - package-ecosystem: "docker"
    directory: "/sentio-backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/sentio-web"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/sentio-ai/birder"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/sentio-ai/speciesnet"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/sentio-ai/preprocessing"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 0
